services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        # Sync source changes into container — uvicorn --reload picks them up
        - path: ./src
          action: sync
          target: /app/src
        - path: ./alembic
          action: sync
          target: /app/alembic
        - path: ./main.py
          action: sync
          target: /app/main.py
        # Dependency changes require a full image rebuild to re-run uv sync
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild
        - path: ./Dockerfile.dev
          action: rebuild

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       hybrid_mcp
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
